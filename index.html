<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rayn Scofield · Project 007</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0a0a0a;
      --surface: #111111;
      --card: #181818;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --accent-dim: #8a7048;
      --red: #c0392b;
      --text: #e8e4dc;
      --muted: #666;
      --mono: 'DM Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
    }

    /* Header badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 1.5rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Main card */
    .player-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    /* Cover art area */
    .cover-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--surface);
    }

    .cover-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease, filter 0.6s ease;
      filter: brightness(0.85);
    }

    .cover-art.playing {
      transform: scale(1.02);
      filter: brightness(1);
    }

    .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: var(--muted);
    }

    .cover-placeholder svg {
      opacity: 0.3;
    }

    /* Track overlay on cover */
    .cover-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem 1.5rem 1rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
    }

    .track-number {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .track-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      line-height: 1;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    /* Controls section */
    .controls-section {
      padding: 1.5rem;
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 1.5rem;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s linear;
    }

    /* Main controls */
    .main-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .btn-ctrl {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      transition: color 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .btn-ctrl:hover { color: var(--text); }
    .btn-ctrl:active { transform: scale(0.92); }

    .btn-play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--black);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-play:hover { background: #dfc07e; }
    .btn-play:active { transform: scale(0.95); }

    /* Playlist */
    .playlist-wrap {
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      max-height: 200px;
      overflow-y: auto;
    }

    .playlist-wrap::-webkit-scrollbar { width: 3px; }
    .playlist-wrap::-webkit-scrollbar-track { background: transparent; }
    .playlist-wrap::-webkit-scrollbar-thumb { background: var(--border); }

    .playlist-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      cursor: pointer;
      transition: color 0.2s;
    }

    .track-item:last-child { border-bottom: none; }
    .track-item:hover { color: var(--accent); }
    .track-item.active { color: var(--accent); }

    .track-idx {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      min-width: 20px;
      text-align: right;
    }

    .track-item.active .track-idx { color: var(--accent); }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .track-dur {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* Volume */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 0.5rem;
    }

    .vol-row svg { color: var(--muted); flex-shrink: 0; }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    /* Status bar */
    .status-bar {
      padding: 8px 1.5rem;
      background: rgba(200,169,110,0.04);
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--muted);
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.ok { background: #27ae60; }
    .status-dot.err { background: var(--red); }

    /* Eq bars animation */
    .eq-bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 14px;
    }

    .eq-bar {
      width: 3px;
      background: var(--accent);
      border-radius: 1px;
      animation: none;
      height: 3px;
      transition: height 0.2s;
    }

    .playing .eq-bar:nth-child(1) { animation: eq1 0.8s infinite; }
    .playing .eq-bar:nth-child(2) { animation: eq2 0.9s infinite 0.1s; }
    .playing .eq-bar:nth-child(3) { animation: eq3 0.7s infinite 0.2s; }
    .playing .eq-bar:nth-child(4) { animation: eq4 1s infinite 0.05s; }

    @keyframes eq1 { 0%,100%{height:3px} 50%{height:12px} }
    @keyframes eq2 { 0%,100%{height:8px} 50%{height:4px} }
    @keyframes eq3 { 0%,100%{height:5px} 50%{height:14px} }
    @keyframes eq4 { 0%,100%{height:10px} 50%{height:3px} }
  </style>
</head>
<body>

<div class="container">
  <div class="badge">Project 007 · Portfolio</div>

  <div class="player-card" id="playerCard">
    <div id="appContent">
      </div>
  </div>
</div>

<audio id="audioEl" preload="none"></audio>

<script>
const audio = document.getElementById('audioEl');
let playlist = [];
let currentIdx = 0;
let isPlaying = false;

// 1. Gắn cứng dữ liệu nhạc và link Raw từ GitHub của bạn
function initPlayer() {
  playlist = [{
    title: 'Spacewalk',
    artist: 'Rayn Scofield',
    // CHÚ Ý: Đây là link Raw xịn từ kho lưu trữ của bạn
    audio_url: 'https://github.com/Rrayn007/test/raw/refs/heads/main/ShedALight.flac', 
    cover_url: '', // Nếu có link ảnh bìa, dán vào đây
  }];

  renderPlayer();
  initAudio();
  setStatus('BGM đã tải xong', true);
}

// 2. Render giao diện
function renderPlayer() {
  const track = playlist[currentIdx] || {};
  const coverUrl = track.cover_url || '';
  const appContent = document.getElementById('appContent');

  appContent.innerHTML = `
    <div class="cover-wrap" id="coverWrap">
      ${coverUrl
        ? `<img class="cover-art" id="coverImg" src="${coverUrl}" alt="${track.title}" loading="lazy" />`
        : `<div class="cover-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
              <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
              <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
            </svg>
           </div>`
      }
      <div class="cover-overlay">
        <div class="track-number">Track 01 / 01</div>
        <div class="track-title" id="trackTitle">${track.title}</div>
      </div>
    </div>

    <div class="controls-section">
      <div class="progress-wrap">
        <div class="time-row">
          <span id="timeCur">0:00</span>
          <span id="timeDur">--:--</span>
        </div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="main-controls">
        <button class="btn-play" id="btnPlay">
          <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
      </div>

      <div class="vol-row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
        <input type="range" id="volSlider" min="0" max="100" value="80" />
      </div>
    </div>

    <div class="status-bar">
      <span><span class="status-dot ok" id="statusDot"></span><span id="statusText">Sẵn sàng</span></span>
      <div class="eq-bars" id="eqBars">
        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      </div>
    </div>
  `;

  bindControls();
  updateCoverState();
}

function bindControls() {
  document.getElementById('btnPlay')?.addEventListener('click', togglePlay);
  document.getElementById('progressBar')?.addEventListener('click', seekAudio);
  document.getElementById('volSlider')?.addEventListener('input', e => { audio.volume = e.target.value/100; });
  audio.volume = 0.8;
}

function initAudio() {
  const track = playlist[0];
  if (!track?.audio_url) return;
  audio.src = track.audio_url;
  audio.load();
}

function togglePlay() {
  if (audio.paused) {
    audio.play().then(() => { 
      isPlaying = true; 
      updatePlayState(); 
    }).catch(() => setStatus('Lỗi phát nhạc.', false));
  } else {
    audio.pause();
    isPlaying = false;
    updatePlayState();
  }
}

function updatePlayState() {
  const icon = document.getElementById('playIcon');
  const eqBars = document.getElementById('eqBars');
  if (icon) {
    icon.innerHTML = isPlaying
      ? '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>'
      : '<polygon points="5,3 19,12 5,21"/>';
  }
  if (eqBars) eqBars.classList.toggle('playing', isPlaying);
}

function updateCoverState() {
  const eqBars = document.getElementById('eqBars');
  if (eqBars) eqBars.classList.toggle('playing', isPlaying);
}

function seekAudio(e) {
  if (!audio.duration) return;
  const bar = e.currentTarget;
  const ratio = e.offsetX / bar.offsetWidth;
  audio.currentTime = ratio * audio.duration;
}

function setStatus(msg, ok=true) {
  const el = document.getElementById('statusText');
  const dot = document.getElementById('statusDot');
  if (el) el.textContent = msg;
  if (dot) dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '--:--';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${String(sec).padStart(2,'0')}`;
}

// Xử lý sự kiện Audio
audio.addEventListener('timeupdate', () => {
  const fill = document.getElementById('progressFill');
  const cur = document.getElementById('timeCur');
  const dur = document.getElementById('timeDur');
  if (fill && audio.duration) fill.style.width = (audio.currentTime/audio.duration*100)+'%';
  if (cur) cur.textContent = fmtTime(audio.currentTime);
  if (dur) dur.textContent = fmtTime(audio.duration);
});

audio.addEventListener('ended', () => {
  audio.currentTime = 0;
  audio.play().catch(console.warn);
});

audio.addEventListener('error', () => {
  setStatus('Lỗi phát audio.', false);
  isPlaying = false; updatePlayState();
});

// Khởi động Player
initPlayer();
</script>
</body>
</html>
