<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Music Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
        }
        .player-card {
            background: #34495e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
        }
        audio {
            width: 100%;
            margin-top: 20px;
            filter: sepia(20%) saturate(70%) grayscale(1) contrast(99%) invert(12%); /* Làm trắng thanh nhạc */
        }
        .status {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h3>Music Background</h3>
        <p id="track-name">Đang tải cấu hình...</p>
        
        <audio id="myAudio" controls loop>
            Trình duyệt không hỗ trợ audio.
        </audio>

        <div class="status" id="status-text">Đang kết nối Google Sheets...</div>
    </div>

    <script>
    const sheet_url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";

    async function initMusic() {
        try {
            const response = await fetch(sheet_url);
            const data = await response.text();
            const rows = data.split('\n');
            let foundUrl = "";

            for (let i = 0; i < rows.length; i++) {
                const cols = rows[i].split(',');
                if (cols[0] && cols[0].trim().replace(/"/g, "") === "audio_bgm") {
                    foundUrl = cols[1].trim().replace(/"/g, "");
                    break;
                }
            }

            if (foundUrl) {
                const audio = document.getElementById('myAudio');
                audio.src = foundUrl;
                
                // Bắt lỗi trực tiếp từ thẻ Audio
                audio.onerror = function() {
                    alert("LỖI: Trình duyệt không thể tải file nhạc. Có thể do link Drive chưa mở quyền chia sẻ (Public).");
                };

                audio.oncanplaythrough = function() {
                    console.log("Nhạc đã tải xong và sẵn sàng phát!");
                };

                audio.load();
                audio.play().catch(e => console.log("Cần nhấn Play thủ công do chính sách trình duyệt."));
            } else {
                alert("LỖI: Không tìm thấy chữ 'audio_bgm' trong cột A của Sheet.");
            }
        } catch (err) {
            alert("LỖI: Không thể đọc được file Sheet. Hãy kiểm tra lại link CSV.");
        }
    }
    initMusic();
</script>
</body>
</html>
