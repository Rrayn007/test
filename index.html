<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rayn Scofield | Portfolio 007 Music</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a; 
            color: #ffffff;
            cursor: pointer;
        }
        .player-card {
            background: #262626;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            text-align: center;
            width: 320px;
            border: 1px solid #333;
        }
        h3 { margin-bottom: 5px; color: #e74c3c; text-transform: uppercase; letter-spacing: 2px; }
        #track-name { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; }
        
        audio {
            width: 100%;
            filter: invert(100%); 
            opacity: 0.8;
        }
        .status {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #666;
            min-height: 1.2em;
        }
        .hint {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #f1c40f;
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h3>Project 007</h3>
        <p id="track-name">Đang kết nối dữ liệu...</p>
        
        <audio id="myAudio" controls loop>
            Trình duyệt không hỗ trợ audio.
        </audio>

        <div class="status" id="status-text">Đang tải cấu hình...</div>
        <p class="hint" id="hint-text">Chạm để kích hoạt trải nghiệm</p>
    </div>

    <script>
        // Link CSV từ Google Sheets của bạn
        const sheet_url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzfUCbZ2r6kXI5fSqKov3aJRngpXzCRlhTeW3B8A1whJHLEXjqGDGlrgt-3DC74ZTYxatDqB35eAwP/pub?output=csv";

        const statusLabel = document.getElementById('status-text');
        const trackLabel = document.getElementById('track-name');
        const hintLabel = document.getElementById('hint-text');
        const audio = document.getElementById('myAudio');

        async function initMusic() {
            try {
                // Fetch dữ liệu kèm theo nocache timestamp
                const response = await fetch(`${sheet_url}&t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("Network error");
                
                const data = await response.text();
                const rows = data.split('\n');
                let foundUrl = "";

                for (let i = 0; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols[0]) {
                        // Chuẩn hóa Key để tìm audiobgm
                        let key = cols[0].trim().toLowerCase().replace(/\s+/g, '').replace(/_/g, '');
                        if (key === "audiobgm") {
                            foundUrl = cols[1].trim().replace(/"/g, "");
                            break;
                        }
                    }
                }

                if (foundUrl) {
                    audio.src = foundUrl;
                    audio.load();
                    
                    trackLabel.innerText = "BGM: Ready to Play"; // Bạn có thể sửa tên bài hát ở đây
                    statusLabel.innerText = "Dữ liệu đã tải xong.";

                    // Lắng nghe tương tác đầu tiên để phát nhạc (Thay cho alert)
                    document.body.addEventListener('click', () => {
                        audio.play().then(() => {
                            statusLabel.innerText = "Đang phát nhạc nền...";
                            hintLabel.style.display = 'none'; // Ẩn dòng nhắc sau khi đã phát
                        }).catch(err => {
                            // Chỉ ghi log, không làm phiền người dùng bằng alert
                            console.log("Phát nhạc bị chặn bởi trình duyệt, chờ click manual.");
                            statusLabel.innerText = "Vui lòng nhấn nút Play để nghe nhạc.";
                        });
                    }, { once: true });

                } else {
                    statusLabel.innerText = "Không tìm thấy cấu hình 'audio_bgm'";
                }

            } catch (err) {
                statusLabel.innerText = "Lỗi kết nối. Vui lòng kiểm tra link Sheet.";
                console.error(err);
            }
        }

        // Khởi tạo hệ thống
        initMusic();
    </script>
</body>
</html>
